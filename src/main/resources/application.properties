spring.application.name=wc-fantasy-league
spring.profiles.active=dev

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Expose the health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# JWT
jwt.secret=fantasy-league-super-secret-key-that-is-long-enough-256bit
jwt.expiration=86400000

# Superadmin password (override via SUPERADMIN_PASSWORD env var in prod)
superadmin.password=${SUPERADMIN_PASSWORD:changeme}

# Football API
football-api.key=${FOOTBALL_API_KEY:}
football-api.host=v3.football.api-sports.io
football-api.league-id=1
football-api.season=2026

# Prediction API
prediction-api.url=http://localhost:8082
