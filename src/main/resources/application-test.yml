spring:
  application:
    name: wc-fantasy-league
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

server:
  port: 8081

jwt:
  secret: fantasy-league-super-secret-key-that-is-long-enough-256bit
  expiration: 86400000

football-api:
  key:
  host: v3.football.api-sports.io
  league-id: 1
  season: 2026

prediction-api:
  url: http://localhost:8082
